spring.application.name=plateforme_emploi
# ==========================================
# CONFIGURATION BASE DE DONNÉES MYSQL
# Chaque valeur a un défaut local (après le ':') pour ne rien casser en dev,
# et peut être surchargée par une variable d'environnement en production
# (Render, Railway, etc.)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/plateforme_emploi?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURATION JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURATION SERVEUR
# Render (et la plupart des PaaS) injecte automatiquement la variable PORT :
# on l'utilise si présente, sinon on retombe sur 8080 en local.
# ==========================================
server.port=${PORT:8080}

# ==========================================
# CONFIGURATION JWT
# ⚠️ En production, définis JWT_SECRET dans les variables d'environnement
# du service Render (ne garde jamais le secret par défaut en prod).
# ==========================================
app.jwt.secret=${JWT_SECRET:odc_guinee_plateforme_emploi_secret_key_2026_very_long_secure_minimum_64_characters_required}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# CONFIGURATION UPLOAD FICHIERS (CV + lettres de motivation)
# ⚠️ Sur Render sans disque persistant (payant), ce dossier est éphémère :
# les fichiers uploadés sont perdus à chaque redeploy/restart. Voir les
# notes de déploiement pour les options.
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ==========================================
# CONFIGURATION E-MAIL — API HTTP Brevo (et non plus SMTP)
# Raison : Render (offre gratuite) bloque le trafic sortant sur les ports SMTP
# (25, 465, 587). L'API HTTP de Brevo passe par le port 443 (HTTPS), toujours ouvert.
# ⚠️ BREVO_API_KEY est une clé API v3 (Paramètres → SMTP & API → Clés API et MCP),
# différente de la clé SMTP utilisée précédemment.
# ==========================================
app.mail.brevo.api-key=${BREVO_API_KEY:}
app.mail.from=${MAIL_FROM:adlabe629@gmail.com}
app.mail.from-name=${MAIL_FROM_NAME:JobPlatform.GN}

# URL du frontend, utilisée pour construire le lien d'activation envoyé par e-mail
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Durée de validité d'un token d'activation (en heures)
app.activation.token.expiration-hours=24

# ==========================================
# CORS - origines autorisées (liste séparée par des virgules)
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==========================================
# CONFIGURATION LOGS
# ==========================================
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.odc=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
# ==========================================
# Creation d'un compte Admin
# ==========================================
app.admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:admin@jobplatform.gn}
app.admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:ChangeMoi123!}
